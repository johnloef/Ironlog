  logs: "ironlog:logs",
  settings: "ironlog:settings",
  bw: "ironlog:bodyweight",
  active: "ironlog:active",
};

const uid = () => Math.random().toString(36).slice(2, 9);

/* ---- storage helpers (window.storage is async + throws on miss) ---- */
function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v != null ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) { console.error("save failed", key, e); }
}

/* ---- exercise factory ---- */
const ex = (name, ss, type, unit, sets, reps, rest, note, opt = {}) => ({
  id: uid(), name, ss, type, unit, sets, reps, rest, note,
  spine: !!opt.spine, custom: !!opt.custom,
});

const fmtClock = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
const todayISO = () => new Date().toISOString().slice(0, 10);
const niceDate = (iso) =>
  new Date(iso + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" });

/* ============================================================ */
function App() {
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("today");
  const [routines, setRoutines] = useState([]);
  const [logs, setLogs] = useState([]);
  const [settings, setSettings] = useState({ block: 1, week: 1, unit: "lb" });
  const [bw, setBw] = useState([]);
  const [active, setActive] = useState(null); // active session
  const [rest, setRest] = useState(null); // {total, left}
  const restRef = useRef(null);

  /* ---- initial load + seed ---- */
  useEffect(() => {
    (async () => {
      let r = await load(K.routines, null);
      if (!r || !r.length) { r = seedRoutines(); await save(K.routines, r); }
      setRoutines(r);
      setLogs(await load(K.logs, []));
      setSettings(await load(K.settings, { block: 1, week: 1, unit: "lb" }));
      setBw(await load(K.bw, []));
      setActive(await load(K.active, null));
      setReady(true);
    })();
  }, []);

  /* ---- rest timer ---- */
  useEffect(() => {
    if (!rest) { clearInterval(restRef.current); return; }
    restRef.current = setInterval(() => {
      setRest((p) => {
        if (!p) return null;
        if (p.left <= 1) {
          clearInterval(restRef.current);
          if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
          return { ...p, left: 0, done: true };
        }
        return { ...p, left: p.left - 1 };
      });
    }, 1000);
    return () => clearInterval(restRef.current);
  }, [rest && rest.left === null]);

  const startRest = (sec) => { if (sec > 0) setRest({ total: sec, left: sec }); };

  const persistRoutines = (next) => { setRoutines(next); save(K.routines, next); };
  const persistActive = (next) => { setActive(next); save(K.active, next); };
  const persistSettings = (next) => { setSettings(next); save(K.settings, next); };

  /* ---- start / finish a session ---- */
  const startSession = (routine) => {
    const session = {
      routineId: routine.id, routineName: routine.name, startedAt: Date.now(),
      block: settings.block, week: settings.week,
      primer: routine.primer || [],
      warm: { u: UNIVERSAL_WARMUP.map(() => false), p: (routine.primer || []).map(() => false) },
      exercises: routine.exercises.map((e) => ({
        exId: e.id, name: e.name, ss: e.ss, type: e.type, unit: e.unit,
        target: e.reps, rest: e.rest, note: e.note, spine: e.spine,
        sets: Array.from({ length: e.sets }, () => ({ weight: "", reps: "", done: false })),
      })),
    };
    persistActive(session);
    setTab("today");
  };

  const lastPerf = useCallback((name) => {
    for (const l of logs) {
      const m = l.exercises.find((e) => e.name === name && e.sets.some((s) => s.done));
      if (m) return m.sets.filter((s) => s.done);
    }
    return null;
  }, [logs]);

  const finishSession = () => {
    if (!active) return;
    let volume = 0;
    const exercises = active.exercises.map((e) => {
      const sets = e.sets.filter((s) => s.done || s.weight || s.reps);
      sets.forEach((s) => { if (e.type === "reps") volume += (+s.weight || 0) * (+s.reps || 0); });
      return { name: e.name, type: e.type, unit: e.unit, sets };
    }).filter((e) => e.sets.length);
    const log = {
      id: uid(), date: todayISO(), routineName: active.routineName,
      block: active.block, week: active.week,
      durationMin: Math.max(1, Math.round((Date.now() - active.startedAt) / 60000)),
      volume: Math.round(volume), exercises,
    };
    const next = [log, ...logs];
    setLogs(next); save(K.logs, next);
    persistActive(null); setRest(null); setTab("progress");
  };

  const exportData = () => JSON.stringify({ v: 1, exportedAt: todayISO(), routines, logs, settings, bw }, null, 2);
  const importData = (str) => {
    try {
      const d = JSON.parse(str);
      if (d.routines) { setRoutines(d.routines); save(K.routines, d.routines); }
      if (d.logs) { setLogs(d.logs); save(K.logs, d.logs); }
      if (d.settings) { setSettings(d.settings); save(K.settings, d.settings); }
      if (d.bw) { setBw(d.bw); save(K.bw, d.bw); }
      return true;
    } catch { return false; }
  };

  if (!ready) return <Splash />;

  return (
    <div className="il-root">
      <Style />
      <header className="il-head">
        <div className="il-brand">
          <span className="il-mark">▰▰▰</span> IRONLOG
        </div>
        <div className="il-blockchip" onClick={() => setTab("today")}>
          BLOCK {settings.block} · WK {settings.week}
        </div>
      </header>

      <main className="il-main">
        {tab === "today" && (
          <Today
            active={active} routines={routines} settings={settings}
            onSettings={persistSettings} onStart={startSession}
            onUpdate={persistActive} onFinish={finishSession}
            startRest={startRest} lastPerf={lastPerf}
          />
        )}
        {tab === "routines" && (
          <Routines routines={routines} onChange={persistRoutines}
            onStart={startSession} onReset={() => persistRoutines(seedRoutines())} />
        )}
        {tab === "progress" && (
          <Progress logs={logs} bw={bw} unit={settings.unit}
            onAddBw={(entry) => { const n = [entry, ...bw]; setBw(n); save(K.bw, n); }}
            onDeleteLog={(id) => { const n = logs.filter((l) => l.id !== id); setLogs(n); save(K.logs, n); }}
            onExport={exportData} onImport={importData} />
        )}
      </main>

      {rest && <RestBar rest={rest} onAdd={() => setRest((p) => ({ ...p, left: p.left + 15 }))}
        onSkip={() => setRest(null)} />}

      <nav className="il-nav">
        {[["today", "Today", "▤"], ["routines", "Routines", "≣"], ["progress", "Progress", "◴"]].map(
          ([id, label, icon]) => (
            <button key={id} className={`il-navbtn ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
              <span className="il-navicon">{icon}</span>{label}
            </button>
          )
        )}
      </nav>
    </div>
  );
}

/* ---------------- Today ---------------- */
function Today({ active, routines, settings, onSettings, onStart, onUpdate, onFinish, startRest, lastPerf }) {
  if (active) {
    return <ActiveSession active={active} onUpdate={onUpdate} onFinish={onFinish}
      startRest={startRest} lastPerf={lastPerf} unit={settings.unit} />;
  }
  return (
    <div className="il-pad">
      <BlockStepper settings={settings} onSettings={onSettings} />
      <h2 className="il-h2">Start a session</h2>
      <p className="il-sub">Pick today's routine. Your sets and rest timer run from here.</p>
      <div className="il-stack">
        {routines.map((r) => (
          <button key={r.id} className="il-rcard" onClick={() => onStart(r)}>
            <div className="il-rcard-name">{r.name}</div>
            <div className="il-rcard-meta">{r.exercises.length} exercises ›</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function BlockStepper({ settings, onSettings }) {
  const step = (key, d, max) =>
    onSettings({ ...settings, [key]: Math.min(max, Math.max(1, settings[key] + d)) });
  return (
    <div className="il-block">
      <div className="il-block-row">
        <span className="il-block-label">Block</span>
        <div className="il-stepper">
          <button onClick={() => step("block", -1, 4)}>–</button>
          <b>{settings.block}{settings.block === 4 ? " (deload)" : ""}</b>
          <button onClick={() => step("block", 1, 4)}>+</button>
        </div>
      </div>
      <div className="il-block-row">
        <span className="il-block-label">Week</span>
        <div className="il-stepper">
          <button onClick={() => step("week", -1, 8)}>–</button>
          <b>{settings.week} / 8</b>
          <button onClick={() => step("week", 1, 8)}>+</button>
        </div>
      </div>
      <div className="il-block-hint">
        Reps target — Blk 1: 10–15 · Blk 2: 8–12 · Blk 3: 6–10 · Add load only on machine/supported lifts.
      </div>
    </div>
  );
}

/* ---------------- Active session ---------------- */
function ActiveSession({ active, onUpdate, onFinish, startRest, lastPerf, unit }) {
  const groups = groupBySS(active.exercises);
  const doneCount = active.exercises.reduce((a, e) => a + e.sets.filter((s) => s.done).length, 0);
  const totalCount = active.exercises.reduce((a, e) => a + e.sets.length, 0);
  // backfill warm-up state for sessions started before this feature
  const warm = active.warm || { u: UNIVERSAL_WARMUP.map(() => false), p: (active.primer || []).map(() => false) };

  const toggleWarm = (kind, i) => {
    const next = structuredClone(active);
    if (!next.warm) next.warm = { u: UNIVERSAL_WARMUP.map(() => false), p: (next.primer || []).map(() => false) };
    next.warm[kind][i] = !next.warm[kind][i];
    onUpdate(next);
  };

  const setVal = (exIdx, setIdx, field, value) => {
    const next = structuredClone(active);
    next.exercises[exIdx].sets[setIdx][field] = value;
    onUpdate(next);
  };
  const toggleDone = (exIdx, setIdx) => {
    const next = structuredClone(active);
    const s = next.exercises[exIdx].sets[setIdx];
    s.done = !s.done;
    onUpdate(next);
    if (s.done) {
      if (navigator.vibrate) navigator.vibrate(30);
      startRest(next.exercises[exIdx].rest);
    }
  };
  const fillLast = (exIdx) => {
    const e = active.exercises[exIdx];
    const last = lastPerf(e.name);
    if (!last) return;
    const next = structuredClone(active);
    next.exercises[exIdx].sets = next.exercises[exIdx].sets.map((s, i) => ({
      ...s, weight: last[i]?.weight ?? last[last.length - 1]?.weight ?? s.weight,
      reps: last[i]?.reps ?? last[last.length - 1]?.reps ?? s.reps,
    }));
    onUpdate(next);
  };

  let exIdx = -1;
  return (
    <div className="il-pad">
      <div className="il-session-top">
        <div>
          <div className="il-session-name">{active.routineName}</div>
          <div className="il-sub">Block {active.block} · Week {active.week}</div>
        </div>
        <div className="il-progress-ring">{doneCount}/{totalCount}</div>
      </div>
      <div className="il-bar"><div className="il-bar-fill" style={{ width: `${totalCount ? (doneCount / totalCount) * 100 : 0}%` }} /></div>

      <WarmupCard warm={warm} primer={active.primer || []} onToggle={toggleWarm} />

      {groups.map((g, gi) => (
        <div key={gi} className="il-group">
          {g.ss && <div className="il-ss">Superset {g.ss}</div>}
          {g.items.map((e) => {
            exIdx = active.exercises.indexOf(e);
            const idx = exIdx;
            const last = lastPerf(e.name);
            return (
              <div key={e.exId} className={`il-ex ${e.spine ? "spine" : ""}`}>
                <div className="il-ex-head">
                  <div className="il-ex-name">
                    {e.spine && <span className="il-spinedot" title="Spine-sensitive — mind your form">◆</span>}
                    {e.name}
                  </div>
                  <div className="il-ex-target">{e.target}{e.unit ? ` ${e.unit}` : ""}</div>
                </div>
                {e.note && <div className="il-ex-note">{e.note}</div>}
                {last && (
                  <div className="il-last" onClick={() => fillLast(idx)}>
                    Last: {last.map((s) => e.type === "reps" ? `${s.weight || "–"}×${s.reps || "–"}` : (s.reps || "–")).join(", ")}
                    <span className="il-last-fill">tap to fill</span>
                  </div>
                )}
                <div className="il-sets">
                  {e.sets.map((s, si) => (
                    <div key={si} className={`il-setrow ${s.done ? "done" : ""}`}>
                      <span className="il-setn">{si + 1}</span>
                      {e.type === "reps" ? (
                        <>
                          <input className="il-in" inputMode="decimal" placeholder={unit}
                            value={s.weight} onChange={(ev) => setVal(idx, si, "weight", ev.target.value)} />
                          <span className="il-x">×</span>
                          <input className="il-in" inputMode="numeric" placeholder="reps"
                            value={s.reps} onChange={(ev) => setVal(idx, si, "reps", ev.target.value)} />
                        </>
                      ) : (
                        <>
                          <input className="il-in wide" inputMode="numeric" placeholder={e.unit || "value"}
                            value={s.reps} onChange={(ev) => setVal(idx, si, "reps", ev.target.value)} />
                          <span className="il-unit">{e.unit}</span>
                        </>
                      )}
                      <button className="il-check" onClick={() => toggleDone(idx, si)}>{s.done ? "✓" : ""}</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      ))}

      <button className="il-finish" onClick={onFinish}>Finish & save workout</button>
      <button className="il-cancel" onClick={() => { if (confirm("Discard this session without saving?")) onUpdate(null); }}>
        Discard session
      </button>
    </div>
  );
}

function groupBySS(items) {
  const out = [];
  items.forEach((e) => {
    const last = out[out.length - 1];
    if (e.ss && last && last.ss === e.ss) last.items.push(e);
    else out.push({ ss: e.ss || "", items: [e] });
  });
  return out;
}

function WarmupCard({ warm, primer, onToggle }) {
  const [open, setOpen] = useState(true);
  const total = warm.u.length + warm.p.length;
  const done = warm.u.filter(Boolean).length + warm.p.filter(Boolean).length;
  const Row = (label, checked, onClick) => (
    <button className={`il-warm-row ${checked ? "on" : ""}`} onClick={onClick}>
      <span className="il-warm-box">{checked ? "✓" : ""}</span>
      <span className="il-warm-text">{label}</span>
    </button>
  );
  return (
    <div className="il-warm">
      <button className="il-warm-head" onClick={() => setOpen(!open)}>
        <span className="il-warm-title">Warm-up</span>
        <span className="il-warm-count">{done}/{total}</span>
        <span className={`il-chev ${open ? "op" : ""}`}>›</span>
      </button>
      {open && (
        <div className="il-warm-body">
          <div className="il-warm-sub">Universal — every session (~8 min)</div>
          {UNIVERSAL_WARMUP.map((w, i) => Row(w, warm.u[i], () => onToggle("u", i)))}
          {primer.length > 0 && <>
            <div className="il-warm-sub">Today's primer</div>
            {primer.map((w, i) => Row(w, warm.p[i], () => onToggle("p", i)))}
          </>}
        </div>
      )}
    </div>
  );
}

/* ---------------- Routines (view / edit / add) ---------------- */
function Routines({ routines, onChange, onStart, onReset }) {
  const [editing, setEditing] = useState(null); // routine being edited / created

  if (editing) {
    return <RoutineEditor routine={editing}
      onSave={(r) => {
        const exists = routines.some((x) => x.id === r.id);
        onChange(exists ? routines.map((x) => (x.id === r.id ? r : x)) : [...routines, r]);
        setEditing(null);
      }}
      onCancel={() => setEditing(null)} />;
  }

  return (
    <div className="il-pad">
      <div className="il-routines-head">
        <h2 className="il-h2">Routines</h2>
        <button className="il-add" onClick={() => setEditing({ id: uid(), name: "", exercises: [] })}>+ New</button>
      </div>
      <p className="il-sub">Edit the loaded program or build new routines for future blocks.</p>
      <div className="il-stack">
        {routines.map((r) => (
          <div key={r.id} className="il-rcard view">
            <button className="il-rcard-main" onClick={() => onStart(r)}>
              <div className="il-rcard-name">{r.name || "Untitled routine"}</div>
              <div className="il-rcard-meta">{r.exercises.length} exercises · tap to start</div>
            </button>
            <button className="il-edit" onClick={() => setEditing(structuredClone(r))}>Edit</button>
          </div>
        ))}
      </div>
      <button className="il-reset" onClick={() => { if (confirm("Reset to the original 5-day disc-conscious program? Custom routines will be removed.")) onReset(); }}>
        Reset to default program
      </button>
    </div>
  );
}

function RoutineEditor({ routine, onSave, onCancel }) {
  const [name, setName] = useState(routine.name);
  const [items, setItems] = useState(routine.exercises);
  const [primer, setPrimer] = useState(routine.primer || []);

  const add = () => setItems([...items, ex("New exercise", "", "reps", "", 3, "10", 60, "")]);
  const upd = (id, field, val) => setItems(items.map((e) => (e.id === id ? { ...e, [field]: val } : e)));
  const del = (id) => setItems(items.filter((e) => e.id !== id));
  const move = (i, d) => {
    const j = i + d; if (j < 0 || j >= items.length) return;
    const n = [...items]; [n[i], n[j]] = [n[j], n[i]]; setItems(n);
  };

  return (
    <div className="il-pad">
      <div className="il-routines-head">
        <button className="il-back" onClick={onCancel}>‹ Cancel</button>
        <button className="il-add" onClick={() => onSave({ ...routine, name: name || "Untitled", primer, exercises: items })}>Save</button>
      </div>
      <input className="il-name-in" placeholder="Routine name" value={name} onChange={(e) => setName(e.target.value)} />

      <div className="il-primer-edit">
        <div className="il-primer-label">Day-specific warm-up primer</div>
        <div className="il-primer-note">The universal warm-up is added automatically — these are the day's extra moves.</div>
        {primer.map((p, i) => (
          <div key={i} className="il-primer-row">
            <input value={p} onChange={(e) => setPrimer(primer.map((x, j) => (j === i ? e.target.value : x)))} />
            <button onClick={() => setPrimer(primer.filter((_, j) => j !== i))}>✕</button>
          </div>
        ))}
        <button className="il-primer-add" onClick={() => setPrimer([...primer, ""])}>+ Add primer step</button>
      </div>

      <div className="il-stack">
        {items.map((e, i) => (
          <div key={e.id} className="il-edit-ex">
            <input className="il-name-in sm" value={e.name} onChange={(ev) => upd(e.id, "name", ev.target.value)} />
            <div className="il-edit-grid">
              <label>Superset<input value={e.ss} maxLength={2} placeholder="—" onChange={(ev) => upd(e.id, "ss", ev.target.value.toUpperCase())} /></label>
              <label>Sets<input inputMode="numeric" value={e.sets} onChange={(ev) => upd(e.id, "sets", +ev.target.value || 1)} /></label>
              <label>Target<input value={e.reps} onChange={(ev) => upd(e.id, "reps", ev.target.value)} /></label>
              <label>Rest s<input inputMode="numeric" value={e.rest} onChange={(ev) => upd(e.id, "rest", +ev.target.value || 0)} /></label>
              <label>Type
                <select value={e.type} onChange={(ev) => upd(e.id, "type", ev.target.value)}>
                  <option value="reps">weight × reps</option>
                  <option value="time">time</option>
                  <option value="distance">distance</option>
                </select>
              </label>
              <label>Unit<input value={e.unit} placeholder="yd/sec" onChange={(ev) => upd(e.id, "unit", ev.target.value)} /></label>
            </div>
            <input className="il-name-in sm" placeholder="Note (optional)" value={e.note} onChange={(ev) => upd(e.id, "note", ev.target.value)} />
            <label className="il-spine-toggle">
              <input type="checkbox" checked={e.spine} onChange={(ev) => upd(e.id, "spine", ev.target.checked)} />
              Flag as spine-sensitive
            </label>
            <div className="il-edit-actions">
              <button onClick={() => move(i, -1)}>↑</button>
              <button onClick={() => move(i, 1)}>↓</button>
              <button className="del" onClick={() => del(e.id)}>Delete</button>
            </div>
          </div>
        ))}
      </div>
      <button className="il-add full" onClick={add}>+ Add exercise</button>
    </div>
  );
}

/* ---------------- Progress ---------------- */
function Progress({ logs, bw, unit, onAddBw, onDeleteLog, onExport, onImport }) {
  const [w, setW] = useState("");
  const [feel, setFeel] = useState(3);
  const [backup, setBackup] = useState(null); // null | 'export' | 'import'
  const [text, setText] = useState("");
  const [msg, setMsg] = useState("");
  const max = Math.max(1, ...bw.map((b) => b.weight));
  const min = Math.min(max, ...bw.map((b) => b.weight));

  return (
    <div className="il-pad">
      <h2 className="il-h2">Bodyweight & back</h2>
      <div className="il-bw-entry">
        <input className="il-in wide" inputMode="decimal" placeholder={`weight (${unit})`} value={w} onChange={(e) => setW(e.target.value)} />
        <div className="il-feel">
          <span>back feel</span>
          {[1, 2, 3, 4, 5].map((n) => (
            <button key={n} className={`il-feeldot f${n} ${feel === n ? "on" : ""}`} onClick={() => setFeel(n)}>{n}</button>
          ))}
        </div>
        <button className="il-add" disabled={!w} onClick={() => { onAddBw({ date: todayISO(), weight: +w, feel }); setW(""); }}>Log</button>
      </div>
      {bw.length > 0 && (
        <div className="il-spark">
          {[...bw].reverse().slice(-20).map((b, i) => {
            const h = max === min ? 50 : 12 + ((b.weight - min) / (max - min)) * 80;
            return <div key={i} className="il-spark-col" title={`${b.weight} ${unit} · ${niceDate(b.date)}`}>
              <div className={`il-spark-bar feel${b.feel || 3}`} style={{ height: `${h}%` }} />
            </div>;
          })}
        </div>
      )}
      {bw[0] && <div className="il-sub center">Latest: <b>{bw[0].weight} {unit}</b> · back {bw[0].feel}/5 · {niceDate(bw[0].date)}</div>}

      <h2 className="il-h2 mt">History</h2>
      {logs.length === 0 && <div className="il-empty">No sessions yet. Finish a workout and it lands here.</div>}
      <div className="il-stack">
        {logs.map((l) => (
          <details key={l.id} className="il-log">
            <summary>
              <div>
                <div className="il-log-name">{l.routineName}</div>
                <div className="il-log-meta">{niceDate(l.date)} · Blk {l.block}/Wk {l.week} · {l.durationMin}m{l.volume ? ` · ${l.volume.toLocaleString()} ${unit} vol` : ""}</div>
              </div>
              <span className="il-chev">›</span>
            </summary>
            <div className="il-log-body">
              {l.exercises.map((e, i) => (
                <div key={i} className="il-log-ex">
                  <div className="il-log-ex-name">{e.name}</div>
                  <div className="il-log-sets">
                    {e.sets.map((s, si) => (
                      <span key={si} className="il-log-set">
                        {e.type === "reps" ? `${s.weight || "–"}×${s.reps || "–"}` : `${s.reps || "–"}${e.unit || ""}`}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              <button className="il-dellog" onClick={() => { if (confirm("Delete this logged session?")) onDeleteLog(l.id); }}>Delete session</button>
            </div>
          </details>
        ))}
      </div>

      <h2 className="il-h2 mt">Backup &amp; restore</h2>
      <div className="il-backup-note">
        On mobile, the app's storage can reset when you fully close it. Copy a backup here and keep it somewhere safe (a note to yourself, an email). Paste it back anytime to restore everything.
      </div>
      <div className="il-backup-btns">
        <button className="il-backup-btn" onClick={() => { setText(onExport()); setBackup("export"); setMsg(""); }}>Copy backup</button>
        <button className="il-backup-btn" onClick={() => { setText(""); setBackup("import"); setMsg(""); }}>Restore</button>
      </div>
      {backup === "export" && (
        <div className="il-backup-box">
          <div className="il-backup-label">Select all and copy this — that's your save file:</div>
          <textarea className="il-backup-area" readOnly value={text} onFocus={(e) => e.target.select()} />
        </div>
      )}
      {backup === "import" && (
        <div className="il-backup-box">
          <div className="il-backup-label">Paste a backup here, then tap Restore:</div>
          <textarea className="il-backup-area" placeholder="Paste your backup text…" value={text} onChange={(e) => setText(e.target.value)} />
          <button className="il-add full" onClick={() => setMsg(onImport(text) ? "Restored. Your data is back." : "Couldn't read that backup — check you copied all of it.")}>Restore now</button>
          {msg && <div className="il-backup-msg">{msg}</div>}
        </div>
      )}
    </div>
  );
}
function RestBar({ rest, onAdd, onSkip }) {
  const pct = rest.total ? (rest.left / rest.total) * 100 : 0;
  return (
    <div className={`il-rest ${rest.left === 0 ? "fin" : ""}`}>
      <div className="il-rest-prog" style={{ width: `${pct}%` }} />
      <div className="il-rest-inner">
        <span className="il-rest-label">{rest.left === 0 ? "Rest done — go" : "Rest"}</span>
        <span className="il-rest-time">{fmtClock(rest.left)}</span>
        <button onClick={onAdd}>+15s</button>
        <button onClick={onSkip}>{rest.left === 0 ? "Close" : "Skip"}</button>
      </div>
    </div>
  );
}

function Splash() {
  return <div className="il-splash"><Style /><div className="il-mark big">▰▰▰</div><div>IRONLOG</div></div>;
}

.il-empty{color:var(--muted);text-align:center;padding:30px;border:1px dashed var(--line);border-radius:12px;font-size:13px}
.il-log{background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.il-log summary{display:flex;justify-content:space-between;align-items:center;padding:14px;cursor:pointer;list-style:none}
.il-log summary::-webkit-details-marker{display:none}
.il-log-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px}
.il-log-meta{color:var(--muted);font-size:12px;margin-top:2px}
.il-chev{color:var(--muted);transition:transform .2s}
.il-log[open] .il-chev{transform:rotate(90deg)}
.il-log-body{padding:0 14px 14px;border-top:1px solid var(--line)}
.il-log-ex{padding:9px 0;border-bottom:1px solid var(--ink2)}
.il-log-ex-name{font-size:13px;font-weight:600;margin-bottom:4px}
.il-log-sets{display:flex;flex-wrap:wrap;gap:6px}
.il-log-set{font-size:12px;font-variant-numeric:tabular-nums;background:var(--ink2);border-radius:6px;padding:3px 8px;color:var(--muted)}

.il-backup-note{color:var(--muted);font-size:12.5px;line-height:1.5;margin-bottom:12px}
.il-backup-btns{display:flex;gap:10px}
.il-backup-btn{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:13px;font-weight:600;cursor:pointer;font-size:14px}
.il-backup-box{margin-top:12px}
.il-backup-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.il-backup-area{width:100%;height:120px;background:var(--ink2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font-family:ui-monospace,monospace;font-size:11px;resize:vertical}
.il-backup-area:focus{outline:none;border-color:var(--teal)}
.il-backup-msg{margin-top:10px;text-align:center;color:var(--teal);font-size:13px}

.il-rest{position:fixed;bottom:72px;left:0;right:0;max-width:560px;margin:0 auto;background:var(--panel2);border-top:1px solid var(--teal2);overflow:hidden;z-index:30}
.il-rest.fin{background:var(--teal2)}
.il-rest-prog{position:absolute;top:0;left:0;height:100%;background:rgba(35,185,169,.16);transition:width 1s linear}
.il-rest-inner{position:relative;display:flex;align-items:center;gap:12px;padding:12px 16px}
.il-rest-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-size:14px;color:var(--muted)}
.il-rest.fin .il-rest-label{color:var(--ink)}
.il-rest-time{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;font-variant-numeric:tabular-nums;flex:1}
.il-rest.fin .il-rest-time{color:var(--ink)}
.il-rest-inner button{background:var(--ink);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer}

.il-nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;display:flex;background:rgba(12,19,22,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);z-index:25}
.il-navbtn{flex:1;background:none;border:none;color:var(--muted);padding:11px 0 16px;font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.il-navbtn.on{color:var(--teal)}
.il-navicon{font-size:19px}

.il-splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#0c1316;color:#eaf1f2;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:3px}
.il-mark.big{color:#23b9a9;font-size:28px;letter-spacing:-3px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
